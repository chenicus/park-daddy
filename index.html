<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Van Parking</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #0f1115; --panel: #161a21; --line: #262c37; --text: #e6e9ef;
    --muted: #8a93a3; --green: #2ecc71; --blue: #4aa3ff; --orange: #ff9f43;
    --red: #ff5b5b; --accent: #4aa3ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font: 14px/1.4 -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--text); }
  #app { display: flex; height: 100%; }
  #sidebar { width: 380px; min-width: 340px; display: flex; flex-direction: column;
    border-right: 1px solid var(--line); }
  #map { flex: 1; }
  header { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  header h1 { margin: 0 0 2px; font-size: 16px; }
  header p { margin: 0; color: var(--muted); font-size: 12px; }
  .controls { padding: 12px 16px; border-bottom: 1px solid var(--line); display: grid; gap: 10px; }
  .row { display: grid; gap: 4px; }
  .row.two { grid-template-columns: 1fr 1fr; gap: 10px; }
  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  input, select { background: var(--bg); border: 1px solid var(--line); color: var(--text);
    padding: 8px 10px; border-radius: 8px; font-size: 16px; width: 100%; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .destrow { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
  #here { background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; width: 42px; font-size: 16px; cursor: pointer; }
  .seg-wrap { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg { flex: 1; text-align: center; padding: 7px 4px; font-size: 12px; cursor: pointer;
    color: var(--muted); background: var(--bg); border: none; }
  .seg.active { background: var(--accent); color: #06101d; font-weight: 600; }
  button.go { background: var(--accent); color: #06101d; border: none; padding: 11px;
    border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; }
  button.go:disabled { opacity: .5; cursor: default; }
  #results { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .status { padding: 14px 16px; color: var(--muted); font-size: 13px; }
  .card { padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .card:active { background: #1b2129; }
  .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .price { font-weight: 700; font-size: 16px; }
  .price.free { color: var(--green); }
  .walk { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .tag { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 5px;
    margin-top: 6px; margin-right: 4px; }
  .tag.free { background: rgba(46,204,113,.15); color: var(--green); }
  .tag.good { background: rgba(46,204,113,.12); color: #7fd8a6; }
  .tag.warn { background: rgba(255,159,67,.15); color: var(--orange); }
  .tag.flat { background: rgba(74,163,255,.15); color: var(--blue); }
  .nav { display: inline-block; margin-top: 8px; font-size: 12px; color: var(--accent);
    text-decoration: none; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 6px; }
  .rank { color: var(--muted); font-size: 11px; margin-right: 6px; }
  .leaflet-popup-content { font: 13px system-ui; }

  /* phone: map on top, sheet below */
  @media (max-width: 760px) {
    #app { flex-direction: column; }
    #map { height: 42vh; order: -1; flex: none; }
    #sidebar { width: 100%; min-width: 0; border-right: none; flex: 1; min-height: 0; }
    header { padding: 10px 14px; }
    .controls { padding: 10px 14px; }
  }
</style>

<div id="app">
  <div id="sidebar">
    <header>
      <h1>🅿️ Vancouver Parking</h1>
      <p>Best-value street meters near you · free after 10 PM</p>
    </header>
    <div class="controls">
      <div class="row">
        <label>Destination</label>
        <div class="destrow">
          <input id="dest" placeholder="Address, place, or street — e.g. Science World" />
          <button id="here" title="Use my location">📍</button>
        </div>
      </div>
      <div class="row two">
        <div class="row">
          <label>Arrive at</label>
          <input id="arrive" type="time" />
        </div>
        <div class="row">
          <label>Park for (hrs)</label>
          <input id="dur" type="number" min="0.5" step="0.5" value="2" />
        </div>
      </div>
      <div class="row">
        <label>Max walk: <span id="walkval">8</span> min</label>
        <input id="walk" type="range" min="1" max="20" value="8" />
      </div>
      <div class="seg-wrap">
        <button class="seg active" data-sort="balanced">Best value</button>
        <button class="seg" data-sort="cheap">Cheapest</button>
      </div>
      <button class="go" id="go">Find parking</button>
    </div>
    <div id="results"><div class="status">Enter a destination to see ranked spots.</div></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>
