<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Van Parking</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sheet: #ffffff; --map-cover: #fff; --text: #202124; --muted: #5f6368;
    --line: #e8eaed; --chip: #f1f3f4; --accent: #1a73e8; --on-accent: #fff;
    --green: #188038; --shadow: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --sheet: #202124; --map-cover: #202124; --text: #e8eaed; --muted: #9aa0a6;
      --line: #3c4043; --chip: #303134; --accent: #8ab4f8; --on-accent: #202124;
      --green: #81c995; --shadow: 0 1px 3px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: Roboto, system-ui, sans-serif; color: var(--text); background: var(--map-cover); }
  #map { position: absolute; inset: 0; z-index: 1; }
  .leaflet-control-attribution { font-size: 9px; }

  .searchbar { position: absolute; z-index: 500; top: calc(env(safe-area-inset-top, 0px) + 12px);
    left: 12px; right: 12px; height: 50px; background: var(--sheet); border-radius: 28px;
    box-shadow: var(--shadow); display: flex; align-items: center; padding: 0 8px 0 16px; gap: 10px; }
  .searchbar .mi { color: var(--muted); font-size: 22px; flex: none; }
  .searchbar input { flex: 1; border: none; background: none; color: var(--text);
    font-size: 16px; font-family: inherit; outline: none; height: 100%; }
  .searchbar input::placeholder { color: var(--muted); }
  .iconbtn { width: 38px; height: 38px; border-radius: 50%; border: none; background: none;
    color: var(--accent); font-size: 21px; display: grid; place-items: center; cursor: pointer; }
  .iconbtn:active { background: var(--chip); }

  .sheet { position: absolute; z-index: 500; left: 0; right: 0; bottom: 0;
    background: var(--sheet); border-radius: 16px 16px 0 0; box-shadow: var(--shadow);
    max-height: 56vh; display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom, 0px); }
  .handle { width: 36px; height: 5px; border-radius: 3px; background: var(--line);
    margin: 8px auto 4px; flex: none; }
  .trip { padding: 6px 16px 12px; border-bottom: 1px solid var(--line); flex: none; }
  .trip-row { display: flex; gap: 8px; align-items: flex-end; }
  .fld { flex: 1; }
  .fld label { display: block; font-size: 11px; color: var(--muted); margin: 0 0 3px 2px; }
  .fld input { width: 100%; border: 1px solid var(--line); background: var(--sheet);
    color: var(--text); border-radius: 10px; padding: 9px 10px; font-size: 15px; font-family: inherit; }
  .walk-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .walk-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .seg { display: flex; background: var(--chip); border-radius: 20px; padding: 3px; margin-top: 10px; }
  .seg button { flex: 1; border: none; background: none; color: var(--muted); font-family: inherit;
    font-size: 13px; padding: 7px; border-radius: 18px; cursor: pointer; }
  .seg button.active { background: var(--sheet); color: var(--text); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,.2); }

  #results { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .status { padding: 20px 16px; color: var(--muted); font-size: 14px; text-align: center; }
  .card { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    border-bottom: 1px solid var(--line); cursor: pointer; }
  .card:active { background: var(--chip); }
  .card.sel { background: var(--chip); }
  .card .body { flex: 1; min-width: 0; }
  .card .price { font-size: 16px; font-weight: 500; }
  .card .price.free { color: var(--green); }
  .card .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--chip); color: var(--muted); }
  .tag.free { background: rgba(24,128,56,.14); color: var(--green); }
  .dir { flex: none; display: grid; place-items: center; text-align: center; }
  .dir .btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent);
    display: grid; place-items: center; }
  .dir .btn svg { width: 20px; height: 20px; fill: var(--on-accent); }
  .dir .t { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .pricepin { transform: translate(-50%, -100%); font-size: 12px; font-weight: 500; color: #fff;
    padding: 3px 7px; border-radius: 12px; white-space: nowrap; box-shadow: 0 1px 3px rgba(0,0,0,.4);
    border: 1.5px solid #fff; }
  .pricepin.free { background: #1e8e3e; } .pricepin.cheap { background: #1a73e8; }
  .pricepin.mid { background: #f9ab00; color: #202124; } .pricepin.high { background: #d93025; }
  .pricepin.sel { transform: translate(-50%, -100%) scale(1.18); z-index: 1000 !important; }
  .destpin { width: 20px; height: 20px; border-radius: 50%; background: #ea4335;
    border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.5); transform: translate(-50%, -50%); }

  @media (min-width: 760px) {
    .searchbar { width: 400px; right: auto; }
    .sheet { width: 400px; right: auto; top: 74px; bottom: 16px; max-height: none;
      border-radius: 16px; }
  }
</style>

<div id="map"></div>

<div class="searchbar">
  <span class="mi">📍</span>
  <input id="dest" placeholder="Search a destination" />
  <button class="iconbtn" id="here" aria-label="Use my location">◎</button>
</div>

<div class="sheet">
  <div class="handle"></div>
  <div class="trip">
    <div class="trip-row">
      <div class="fld"><label>Arrive</label><input id="arrive" type="time" /></div>
      <div class="fld"><label>Park (hrs)</label><input id="dur" type="number" min="0.5" step="0.5" value="2" /></div>
    </div>
    <div class="walk-row">
      <label>Walk ≤ <span id="walkval">8</span> min</label>
      <input id="walk" type="range" min="1" max="20" value="8" />
    </div>
    <div class="seg">
      <button class="active" data-sort="balanced">Best value</button>
      <button data-sort="cheap">Cheapest</button>
    </div>
  </div>
  <div id="results"><div class="status">Search a destination to see parking near it.</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>
